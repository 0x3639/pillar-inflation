name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e "python[dev]"
      - run: pytest python -v

  fixture-parity:
    runs-on: ubuntu-latest
    needs: python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - name: Install Python pkg
        run: pip install -e "python[dev]"
      - name: Regenerate fixtures
        run: pillar-sim emit-fixtures
      - name: Fail if fixtures drifted from committed copy
        run: |
          if ! git diff --exit-code shared/fixtures; then
            echo "::error::Fixtures are out of date. Run 'pillar-sim emit-fixtures' locally and commit."
            exit 1
          fi
      - name: Install web deps
        working-directory: web
        run: npm ci
      - name: Run TS parity tests
        working-directory: web
        run: npm test
      - name: TypeScript check
        working-directory: web
        run: npm run typecheck
